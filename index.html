<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>童軍摩斯密碼練習器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>⛺ 童軍摩斯密碼練習器</h1>
        
        <div class="control-panel">
            <div class="control-row">
                <label for="dictSelect">📚 選擇密碼表：</label>
                <select id="dictSelect" class="styled-select" onchange="switchDictionary()">
                    <option value="standard">國際標準版 (僅英數字)</option>
                    <option value="extended">擴充符號版 (加入標點符號)</option>
                </select>
            </div>

            <div class="control-row" style="margin-bottom: 5px;">
                <label for="wpmSlider">⚙️ 播放與判定速度：<span id="wpmValue">10</span> WPM</label>
                <input type="range" id="wpmSlider" class="wpm-slider" min="5" max="30" value="10" oninput="updateConfigs()">
            </div>
            
            <div class="toggles">
                <label class="toggle-item"><input type="checkbox" id="cfgSound" checked onchange="updateConfigs()"> 🔊 聲音</label>
                <label class="toggle-item"><input type="checkbox" id="cfgLight" checked onchange="updateConfigs()"> 💡 燈光</label>
                <label class="toggle-item"><input type="checkbox" id="cfgVibrate" onchange="updateConfigs()"> 📳 震動</label>
            </div>
        </div>

        <div id="lightBox"></div>

        <div class="tab-container">
            <button class="tab-button active" onclick="openTab(event, 'TranslateTab')">📝 翻譯</button>
            <button class="tab-button" onclick="openTab(event, 'LearnTab')">📖 學習</button>
            <button class="tab-button" onclick="openTab(event, 'PracticeTab')">🎯 測驗</button>
            <button class="tab-button" onclick="openTab(event, 'ManualTab')">🖐️ 發報</button>
        </div>

        <div id="TranslateTab" class="tab-content" style="display: block;">
            <p>輸入文字即時翻譯，並可點擊播放：</p>
            <textarea id="inputText" placeholder="請輸入文字..." oninput="handleInput()"></textarea>
            <button class="action-btn" onclick="translateAndPlay()">▶️ 播放密碼</button>
            <textarea id="outputText" placeholder="密碼會即時翻譯在這裡..." readonly></textarea>
        </div>

        <div id="LearnTab" class="tab-content">
            <div class="practice-area">
                <p>點擊下方字卡即可播放該字元的密碼！</p>
                <div id="dictGrid" class="dict-grid">
                    </div>
            </div>
        </div>

        <div id="PracticeTab" class="tab-content">
            <div class="practice-area">
                <p>根據你的感官設定，感受密碼並猜測答案！</p>
                <select id="quizMode" class="styled-select" style="margin-bottom: 15px;">
                    <option value="all">🔀 全部混合</option>
                    <option value="letters">🅰️ 僅英文字母</option>
                    <option value="numbers">🔢 僅數字</option>
                    <option value="symbols" id="optSymbols" style="display:none;">#️⃣ 僅標點符號</option>
                </select>
                <br>
                <button class="action-btn" onclick="generateRandomQuiz()">🎲 隨機出題</button>
                <button class="action-btn" onclick="replayQuiz()">🔄 再播一次</button>
                <br>
                <input type="text" id="userGuess" class="guess-input" maxlength="1" placeholder="?">
                <button class="action-btn" onclick="checkUserAnswer()" style="background-color: #1976d2;">✅ 檢查</button>
                <button class="action-btn" onclick="showAnswer()" style="background-color: #757575;">👀 偷看</button>
                <div id="answerBox">請點擊上方「隨機出題」開始</div>
            </div>
        </div>

        <div id="ManualTab" class="tab-content">
            <div class="practice-area">
                <p>依據你設定的 WPM 速度來敲擊按鈕</p>
                <button id="telegraphKey" onpointerdown="startPress(event)" onpointerup="endPress(event)" onpointerleave="endPress(event)">發報鍵</button>
                <div id="currentSignalDisplay">...</div>
                <div id="currentWpmDisplay">發送速率：-- WPM</div>
                <textarea id="manualOutputText" placeholder="你發送的文字會顯示在這裡..." readonly style="height: 60px;"></textarea>
                <button class="action-btn" onclick="addSpace()">➕ 空白</button>
                <button class="action-btn" onclick="clearManualOutput()" style="background-color: #757575;">🗑️ 清除</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
