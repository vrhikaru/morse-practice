<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#123A2F">
<meta name="color-scheme" content="light dark">
<title>童軍摩斯密碼練習器</title>
<link rel="stylesheet" href="style.css?v=9">
</head>
<body>

<div class="app">

  <!-- ===== 頂部：訊號燈永遠看得見 ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark">⛺</span>
      <div class="brand-text">
        <h1>童軍摩斯密碼練習器</h1>
        <p>光 · 聲 · 震動 三合一訊號</p>
      </div>
    </div>
    <div class="lamp-slot">
      <div id="lamp" class="lamp" role="img" aria-label="訊號燈"></div>
      <span id="lampLabel" class="lamp-label">待命</span>
    </div>
  </header>

  <!-- ===== 節奏帶：把正在發送的滴答畫出來 ===== -->
  <div id="ribbon" class="ribbon" aria-hidden="true">
    <span class="ribbon-idle">節奏帶：播放時會顯示滴（短）／答（長）</span>
  </div>

  <main id="main">

    <!-- ========== 翻譯 ========== -->
    <section id="TranslateTab" class="panel is-active">
      <div class="seg" role="radiogroup" aria-label="翻譯方向">
        <input type="radio" name="tDir" id="dirEncode" checked>
        <label for="dirEncode">文字 ➜ 密碼</label>
        <input type="radio" name="tDir" id="dirDecode">
        <label for="dirDecode">密碼 ➜ 文字</label>
      </div>

      <label class="field-label" for="inputText"><span id="inputLabel">輸入文字</span></label>
      <textarea id="inputText" placeholder="例如：BE PREPARED"></textarea>

      <div class="btn-row">
        <button id="btnPlayMorse" class="btn btn-primary">▶️ 播放密碼</button>
        <button id="btnStopMorse" class="btn btn-ghost">⏹️ 停止</button>
        <button id="btnClearText" class="btn btn-ghost">🗑️ 清除</button>
      </div>

      <label class="field-label" for="outputText"><span id="outputLabel">翻譯結果</span>
        <button id="btnCopy" class="btn-mini">📋 複製</button>
      </label>
      <textarea id="outputText" class="mono" placeholder="結果會即時出現在這裡…" readonly></textarea>
      <p class="hint">一個空白＝字元間隔，<code>/</code>＝單字間隔。</p>
    </section>

    <!-- ========== 學習 ========== -->
    <section id="LearnTab" class="panel">
      <div class="toolbar">
        <input type="search" id="dictSearch" class="search" placeholder="🔍 搜尋字元（例如 S 或 ...）">
      </div>
      <p class="hint">點字卡＝播放該字元的密碼。</p>
      <div id="dictGrid"></div>
    </section>

    <!-- ========== 測驗 ========== -->
    <section id="PracticeTab" class="panel">

      <div class="seg" role="radiogroup" aria-label="測驗模式">
        <input type="radio" name="pMode" id="modeDecode" checked>
        <label for="modeDecode">🎧 聽讀解碼</label>
        <input type="radio" name="pMode" id="modeEncode">
        <label for="modeEncode">👁️ 視覺編碼</label>
      </div>
      <p id="practiceHint" class="hint hint-strong">聆聽密碼聲音，輸入對應的字元。</p>

      <div class="btn-row">
        <button id="btnStartQuiz" class="btn btn-primary btn-block">▶️ 開始測驗</button>
        <button id="btnStopQuiz" class="btn btn-danger btn-block" hidden>⏹️ 結束測驗</button>
      </div>

      <label class="field-label" for="quizMode">題庫範圍</label>
      <select id="quizMode" class="select">
        <option value="koch">⭐ Koch 柯赫學習法（推薦）</option>
        <option value="all">🔀 全部混合</option>
        <option value="letters">🅰️ 僅英文字母</option>
        <option value="numbers">🔢 僅數字</option>
        <option value="symbols" hidden>#️⃣ 僅標點符號</option>
      </select>

      <div id="kochPanel" class="koch">
        <div class="koch-head">
          <strong>🏆 Koch 等級 <span id="kochLevelVal">1</span></strong>
          <span id="kochChars" class="koch-chars mono">K M</span>
        </div>
        <input type="range" id="kochLevelSlider" class="slider" min="1" max="35" value="1">
        <label class="check">
          <input type="checkbox" id="autoLevelKoch" checked>
          📈 連對 5 題自動晉級
        </label>
        <div class="progress" aria-hidden="true"><div id="kochProgress" class="progress-bar"></div></div>
      </div>

      <div id="questionDisplay" class="question">尚未開始</div>

      <div class="btn-row btn-row-center">
        <button id="btnReplay" class="btn btn-sky">🔁 再聽一次</button>
        <button id="btnShowAnswer" class="btn btn-ghost">💡 看答案</button>
      </div>

      <input type="text" id="userGuess" class="guess" maxlength="1" placeholder="?" autocomplete="off" autocapitalize="characters" spellcheck="false">

      <div id="morseKeypad" class="keypad" hidden>
        <button class="key key-dot" data-morse=".">・<small>滴</small></button>
        <button class="key key-dash" data-morse="-">—<small>答</small></button>
        <button class="key key-del" id="btnBackspace">⌫<small>刪除</small></button>
      </div>

      <button id="btnCheck" class="btn btn-primary btn-block btn-lg">✅ 檢查答案</button>

      <div id="answerBox" class="answer" role="status" aria-live="polite"></div>

      <div class="stats">
        <div class="stat"><span id="stCorrect">0</span><small>答對</small></div>
        <div class="stat"><span id="stTotal">0</span><small>總題數</small></div>
        <div class="stat"><span id="stRate">0%</span><small>正確率</small></div>
        <div class="stat stat-fire"><span id="stStreak">0</span><small>🔥 連對</small></div>
        <button id="btnReset" class="btn-mini btn-mini-danger">歸零</button>
      </div>
    </section>

    <!-- ========== 發報 ========== -->
    <section id="ManualTab" class="panel">
      <p class="hint hint-strong">按住＝發送。短按是「滴」，長按是「答」。<br>系統會跟著你的手速自動校正，停頓久一點就自動斷字；想馬上送出可按「斷字」。</p>

      <button id="telegraphKey" class="tkey">發報鍵<small>按住或按空白鍵</small></button>

      <div class="readout">
        <div class="readout-item">
          <small>目前訊號</small>
          <div id="currentSignalDisplay" class="mono readout-big">—</div>
        </div>
        <div class="readout-item">
          <small>發送速率</small>
          <div id="currentWpmDisplay" class="readout-big">-- WPM</div>
        </div>
      </div>

      <label class="field-label" for="manualOutputText">解讀結果</label>
      <textarea id="manualOutputText" placeholder="你發送的文字會顯示在這裡…" readonly></textarea>

      <div class="btn-row">
        <button id="btnBreak" class="btn btn-ghost">⏎ 斷字</button>
        <button id="btnSpace" class="btn btn-ghost">␣ 空白</button>
        <button id="btnManualBack" class="btn btn-ghost">⌫ 退一格</button>
        <button id="btnClearManual" class="btn btn-ghost">🗑️ 清除</button>
      </div>
    </section>

    <!-- ========== 設定 ========== -->
    <section id="SettingsTab" class="panel">
      <label class="field-label" for="themeSelect">🌗 主題</label>
      <select id="themeSelect" class="select">
        <option value="auto">🔄 跟隨手機系統</option>
        <option value="light">☀️ 淺色（日間 / 戶外）</option>
        <option value="dark">🌙 深色（夜間 / 營火）</option>
      </select>

      <label class="field-label" for="dictSelect">📚 密碼表</label>
      <select id="dictSelect" class="select">
        <option value="standard">國際標準版（英文字母＋數字）</option>
        <option value="extended">擴充符號版（＋標點符號）</option>
      </select>

      <div class="setting">
        <label for="freqSlider">🎵 聲音頻率 <b id="freqValue">600</b> Hz</label>
        <input type="range" id="freqSlider" class="slider" min="300" max="1000" step="10" value="600">
      </div>

      <div class="setting">
        <label for="charWpmSlider">⚡ 字元速度 <b id="charWpmValue">20</b> WPM</label>
        <input type="range" id="charWpmSlider" class="slider" min="5" max="40" value="20">
      </div>

      <div class="setting">
        <label for="overallWpmSlider">🐢 整體速度 <b id="overallWpmValue">10</b> WPM</label>
        <input type="range" id="overallWpmSlider" class="slider" min="5" max="40" value="10">
        <p class="hint">Farnsworth 練法：字元照原速打，但字與字之間拉長，比較好聽出節奏。整體速度不會超過字元速度。</p>
      </div>

      <div class="toggles">
        <label class="chip"><input type="checkbox" id="cfgSound" checked> 🔊 聲音</label>
        <label class="chip"><input type="checkbox" id="cfgLight" checked> 💡 燈光</label>
        <label class="chip"><input type="checkbox" id="cfgVibrate"> 📳 震動</label>
      </div>

      <button id="btnTestSignal" class="btn btn-ghost btn-block">🔔 試聽（SOS）</button>
      <p class="hint">設定會自動記住，下次打開還在。</p>
    </section>

  </main>

  <!-- ===== 底部導覽：手機單手好按 ===== -->
  <nav class="tabbar" id="tabbar" role="tablist">
    <button class="tab is-active" data-tab="TranslateTab" role="tab" aria-selected="true"><span>📝</span>翻譯</button>
    <button class="tab" data-tab="LearnTab" role="tab" aria-selected="false"><span>📖</span>學習</button>
    <button class="tab" data-tab="PracticeTab" role="tab" aria-selected="false"><span>🎯</span>測驗</button>
    <button class="tab" data-tab="ManualTab" role="tab" aria-selected="false"><span>🖐️</span>發報</button>
    <button class="tab" data-tab="SettingsTab" role="tab" aria-selected="false"><span>⚙️</span>設定</button>
  </nav>

</div>

<script src="app.js?v=9"></script>
</body>
</html>
